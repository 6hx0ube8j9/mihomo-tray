name: Build Mihomo Tray

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      GOOS: windows
      GOARCH: amd64

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: false # 禁用缓存防止 go.sum 错误

    - name: Init and Dependencies
      shell: pwsh
      run: |
        if (Test-Path "go.mod") { Remove-Item "go.mod" }
        go mod init mihomo-tray
        # 显式拉取 Windows 系统包
        go get golang.org/x/sys/windows
        go get github.com/getlantern/systray
        go get github.com/go-resty/resty/v2
        go mod tidy

    - name: Build with Icon
      shell: pwsh
      run: |
        go install github.com/tc-hib/go-winres@latest
        # 执行 winres 生成 syso 资源
        go-winres make
        # 编译：-ldflags 移除调试信息并隐藏控制台
        go build -ldflags="-s -w -H windowsgui" -o mihomo-tray.exe main.go

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mihomo-tray
        path: mihomo-tray.exe
