name: Build Mihomo Tray

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: false

    - name: Build Execution
      shell: pwsh
      run: |
        # 1. 初始化模块
        if (Test-Path "go.mod") { Remove-Item "go.mod" }
        go mod init mihomo-tray
        
        # 2. 强行拉取必要依赖
        go get github.com/getlantern/systray
        go get github.com/go-resty/resty/v2
        go get github.com/shirou/gopsutil/v3/net
        go get github.com/shirou/gopsutil/v3/process
        go get golang.org/x/sys/windows/registry
        go mod tidy

        # 3. 处理图标资源 (报错也不中断)
        go install github.com/tc-hib/go-winres@latest
        try { go-winres make } catch { Write-Host "Winres failed, skipping icons..." }

        # 4. 最终编译
        # 使用 -ldflags 注入参数，确保没有黑窗口
        go build -ldflags="-s -w -H windowsgui" -o mihomo-tray.exe main.go

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mihomo-tray
        path: mihomo-tray.exe
