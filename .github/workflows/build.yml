name: Build Mihomo Tray

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build
      shell: pwsh
      run: |
        # 初始化
        if (Test-Path "go.mod") { Remove-Item "go.mod" }
        go mod init mihomo-tray
        go mod tidy
        
        # 1. 安装并运行 winres (生成图标资源文件)
        go install github.com/tc-hib/go-winres@latest
        go-winres make
        
        # 2. 检查生成的 syso 文件是否存在 (调试用)
        ls *.syso
        
        # 3. 编译
        # 注意：Go 会自动链接当前目录下的 .syso 文件到 EXE
        go build -ldflags "-s -w -H windowsgui" -o mihomo-tray.exe main.go

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mihomo-tray
        path: mihomo-tray.exe
